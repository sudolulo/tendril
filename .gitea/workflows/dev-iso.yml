name: dev-iso

# Build a DEV-channel installer ISO from the rolling `:dev` image and publish it to dl.onetick.ninja,
# so a tester can install the dev channel directly. Deliberately NOT on every dev push — ISO builds are
# slow (bootc-image-builder), and updates don't need a new ISO: a machine installed from this ISO tracks
# `git.onetick.ninja/flan/tendril:dev` and rolls forward via `bootc upgrade` (deploy-dev.yml republishes
# `:dev` on every push). So this runs on demand + nightly only, keeping the per-push flow light.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 7 * * *' # nightly ~07:00 UTC; adjust or drop for on-demand only

concurrency:
  group: dev-iso
  cancel-in-progress: true

jobs:
  build:
    runs-on: host
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - name: Build + publish the dev installer ISO
        env:
          REG: git.onetick.ninja
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REG_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO: ${{ github.repository }}
          DL_DIR: /srv/tendril-dl
        run: |
          set -euo pipefail
          work="$(mktemp -d)"; trap 'rm -rf "$work"' EXIT
          git clone "https://oauth2:${TOKEN}@${REG}/${REPO}.git" "$work/repo"
          cd "$work/repo"
          git checkout origin/dev

          # Pull the current :dev image and build the ISO FROM it (by its registry ref), so the installed
          # system's bootc origin is git.onetick.ninja/flan/tendril:dev — i.e. it tracks the dev channel
          # and `bootc upgrade` just works. (build-installer.sh skips its own build when the image exists.)
          echo "$REG_TOKEN" | podman login "$REG" -u "$OWNER" --password-stdin
          podman pull "$REG/$OWNER/tendril:dev"
          rm -rf out
          bash scripts/build-installer.sh --type iso --image "$REG/$OWNER/tendril:dev" --output ./out
          iso="$(find ./out -type f -iname '*.iso' -print -quit)"
          [ -n "$iso" ] || { echo "no dev ISO produced" >&2; exit 1; }

          # Publish under a stable dev name with its OWN checksum sidecar — do NOT touch the stable
          # SHA256SUMS, which release.yml owns.
          name="tendril-dev-installer-x86_64.iso"
          install -d "$DL_DIR"
          cp -f "$iso" "$DL_DIR/$name"
          sha="$(sha256sum "$DL_DIR/$name" | awk '{print $1}')"
          printf '%s  %s\n' "$sha" "$name" > "$DL_DIR/$name.sha256"
          chcon -R -t httpd_sys_content_t "$DL_DIR" 2>/dev/null || true
          echo "Published $name (sha256 $sha) -> https://dl.onetick.ninja/$name"
