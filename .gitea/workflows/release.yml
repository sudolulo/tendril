name: release

# Build and publish a Tendril release on every push to `main` (main is releases-only):
#   1. build the bootc host image
#   2. push it to the Gitea container registry (git.onetick.ninja/flan/tendril:<version> and :latest)
#   3. build the installer ISO with bootc-image-builder
#   4. publish the ISO to dl.onetick.ninja (/srv/tendril-dl + SHA256SUMS)
#
# The version comes from Cargo.toml; if a release for that version already exists, the job exits early
# (so a non-version-bump push to main is a cheap no-op). No `paths:` filter — it was unreliable on
# fast-forward PR merges, silently skipping the release; the early version check makes it safe to run on
# any main push instead.
#
# Runs on the self-hosted `host` runner (root) — image builds and bootc-image-builder need podman and
# loopback devices, which the Docker-mode runner can't provide.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  release:
    runs-on: host
    # The image + ISO build is slow (bootc-image-builder); give it plenty of headroom so it's never
    # killed mid-build.
    timeout-minutes: 120
    # The built-in Actions token needs package-write to push to the container registry (login is
    # rejected as "invalid username/password" without it) and repo-read to clone.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Build image + ISO and publish
        env:
          REG: git.onetick.ninja
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A real PAT — the built-in Actions token can't authenticate to the container registry.
          REG_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          DL_DIR: /srv/tendril-dl
          # Optional: a URL you legitimately control (your NVIDIA vGPU eval/licensing download) for the
          # licensed NVIDIA vGPU host .run. Set it to auto-build the NVIDIA variant into a PRIVATE repo.
          # Never a public mirror — NVIDIA's driver is non-redistributable (see image/vgpu/README.md).
          NVIDIA_VGPU_RUN_URL: ${{ secrets.NVIDIA_VGPU_RUN_URL }}
          # Optional: cosign keypair for image signing (see the signing step). Leave unset to skip.
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          # Checkout (private repo → clone with the built-in token; masked in logs).
          git clone "https://oauth2:${TOKEN}@${REG}/${REPO}.git" "$work/repo"
          cd "$work/repo"
          git checkout "$SHA"

          V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          api="https://${REG}/api/v1/repos/${REPO}"
          auth="Authorization: token ${REG_TOKEN}"
          tag="v$V"

          # Idempotency: if this version is already released, there's nothing to do. Makes it safe to
          # trigger on every main push (bump the version in Cargo.toml to cut a release).
          if curl -fsS -H "$auth" "$api/releases/tags/$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to build. Bump the version in Cargo.toml to release."
            exit 0
          fi
          echo "Releasing Tendril $V"

          # 1. Build the bootc host image.
          podman build -f image/Containerfile -t localhost/tendril:dev .

          # 2. Push to the Gitea container registry (PAT — the built-in token is rejected here).
          echo "$REG_TOKEN" | podman login "$REG" -u "$OWNER" --password-stdin
          podman tag localhost/tendril:dev "$REG/$OWNER/tendril:$V"
          podman tag localhost/tendril:dev "$REG/$OWNER/tendril:latest"
          podman push "$REG/$OWNER/tendril:$V"
          podman push "$REG/$OWNER/tendril:latest"

          # Optional supply-chain signing: sign the pushed image digest with cosign when a key is
          # configured (COSIGN_PRIVATE_KEY / COSIGN_PASSWORD secrets). Signatures follow the digest,
          # so a later `:stable` promotion of this image verifies too. Non-fatal: signing must never
          # block a release; add the secrets + cosign binary on the runner to enable.
          set +e
          if [ -n "${COSIGN_KEY:-}" ] && command -v cosign >/dev/null 2>&1; then
            digest="$(podman image inspect --format '{{ index .RepoDigests 0 }}' "$REG/$OWNER/tendril:$V")" \
              && cosign sign -y --key env://COSIGN_KEY "$digest" \
              && echo "Signed $digest" || echo "WARNING: cosign signing failed (non-fatal)"
          else
            echo "cosign key or binary not present — skipping image signing (optional)."
          fi
          set -e

          # 3. Build the installer ISO.
          rm -rf out
          bash scripts/build-installer.sh --type iso --output ./out
          # `-print -quit` stops find at the first match itself — no `| head`, which under pipefail
          # SIGPIPEs find (exit 141) and aborted the job right after the ISO was built.
          iso="$(find ./out -type f -iname '*.iso' -print -quit)"
          [ -n "$iso" ] || { echo "no ISO produced" >&2; exit 1; }

          # 4. Publish it to dl.onetick.ninja (served by nginx from /srv/tendril-dl).
          name="tendril-$V-installer-x86_64.iso"
          latest="tendril-latest-installer-x86_64.iso"
          install -d "$DL_DIR"
          cp -f "$iso" "$DL_DIR/$name"
          ln -sfn "$name" "$DL_DIR/$latest"
          # SHA256SUMS covers both the versioned name and the `latest` name (same bytes).
          ( cd "$DL_DIR"
            h="$(sha256sum "$name" | awk '{print $1}')"
            printf '%s  %s\n%s  %s\n' "$h" "$name" "$h" "$latest" > SHA256SUMS )
          chcon -R -t httpd_sys_content_t "$DL_DIR" 2>/dev/null || true
          ISO_SHA="$(sha256sum "$DL_DIR/$name" | awk '{print $1}')"
          echo "Published $name → https://dl.onetick.ninja/$name"

          # 5. Create the stable Gitea release for tag v$V (api/auth/tag were set + existence-checked
          #    at the top; if we got here the release doesn't exist yet).
          notes="$(printf 'Tendril %s\n\nContainer image: `%s/%s/tendril:%s` (also `:latest`)\nvGPU (AMD): `%s/%s/tendril:vgpu-amd` — auto-updates + rolls back like the base\n\nInstaller ISO: https://dl.onetick.ninja/%s\nSHA-256: `%s`\n\nVerify: `sha256sum -c SHA256SUMS` against https://dl.onetick.ninja/SHA256SUMS' "$V" "$REG" "$OWNER" "$V" "$REG" "$OWNER" "$name" "$ISO_SHA")"
          body="$(TAG="$tag" NAME="Tendril $V" NOTES="$notes" SHA="$SHA" python3 -c 'import json,os; print(json.dumps({"tag_name":os.environ["TAG"],"target_commitish":os.environ["SHA"],"name":os.environ["NAME"],"body":os.environ["NOTES"],"draft":False,"prerelease":False}))')"
          curl -fsS -X POST -H "$auth" -H 'Content-Type: application/json' \
            -d "$body" "$api/releases" >/dev/null && echo "Created Gitea release $tag."

          # 6. vGPU host-driver image variants — layer a vGPU driver onto the base we just built so
          #    vGPU appliances get the SAME auto-update + rollback guarantees as the base (bootc pulls
          #    the whole variant image atomically; the kernel module is baked against this exact base
          #    kernel, so there's never module/kernel skew). Non-fatal: the base release + ISO are
          #    already published above, and an unvalidated variant build must never fail a good release.
          echo "== vGPU variants =="
          set +e
          # AMD GIM is open-source and redistributable → publish it publicly alongside the base.
          if podman build -f image/vgpu/Containerfile.amd-gim --build-arg BASE=localhost/tendril:dev \
               -t "$REG/$OWNER/tendril:vgpu-amd-$V" -t "$REG/$OWNER/tendril:vgpu-amd" . ; then
            podman push "$REG/$OWNER/tendril:vgpu-amd-$V" && podman push "$REG/$OWNER/tendril:vgpu-amd" \
              && echo "Published tendril:vgpu-amd ($V)" || echo "WARNING: vgpu-amd push failed (non-fatal)"
          else
            echo "WARNING: vgpu-amd build failed (non-fatal) — base release is unaffected."
          fi

          # NVIDIA vGPU host driver is LICENSED and non-redistributable. We build it ONLY when you
          # supply a URL you legitimately control (your NVIDIA eval/licensing download — NOT a public
          # mirror), and push it to a SEPARATE repo you must keep PRIVATE (for your own licensed use).
          if [ -n "${NVIDIA_VGPU_RUN_URL:-}" ]; then
            echo "== NVIDIA vGPU variant (private, licensed) =="
            if curl -fSL -o image/vgpu/nvidia-vgpu.run "$NVIDIA_VGPU_RUN_URL" \
               && podman build -f image/vgpu/Containerfile.nvidia-vgpu-unlock --build-arg BASE=localhost/tendril:dev \
                    -t "$REG/$OWNER/tendril-vgpu-nvidia:$V" -t "$REG/$OWNER/tendril-vgpu-nvidia:latest" . ; then
              podman push "$REG/$OWNER/tendril-vgpu-nvidia:$V" && podman push "$REG/$OWNER/tendril-vgpu-nvidia:latest" \
                && echo "Published tendril-vgpu-nvidia ($V) — ensure this repo is PRIVATE." \
                || echo "WARNING: tendril-vgpu-nvidia push failed (non-fatal)"
            else
              echo "WARNING: NVIDIA vGPU variant build failed (non-fatal)."
            fi
            rm -f image/vgpu/nvidia-vgpu.run
          else
            echo "NVIDIA_VGPU_RUN_URL not set — skipping the NVIDIA vGPU variant (supply your licensed .run URL to enable)."
          fi
          set -e
