# Public CI. This is a port of .gitea/workflows/ci.yml, which stays the canonical one.
#
# Gitea runs the FULL pipeline — this job plus dev-iso, deploy-dev, promote-stable and
# release. Those four need a self-hosted `host` runner and registry/dl secrets, so they
# cannot run here and are deliberately not ported. This job needs neither: it is the
# portable half (fmt, clippy, build, test, hygiene), and it exists so anyone looking at
# the public mirror can see the checks actually pass.
#
# Keep the two in sync. If you add a portable check to the Gitea ci.yml, add it here.
name: ci

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # GitHub's runners ship rustup; rust-toolchain.toml (pinned, and asserted against
      # versions.toml below) selects the toolchain, so runs stay reproducible.
      - name: Install pinned toolchain components
        run: rustup component add rustfmt clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Test
        run: cargo test --all --locked

      - name: Repo hygiene
        run: |
          test -f README.md && test -f NOTICE && test -f versions.toml
          # versions.toml is the declared single source of truth for the bootc base image, but the
          # FROM lines are literal — assert they haven't drifted apart. Bounded match (space or EOL
          # after the ref) so a tag/digest extension can't pass as a prefix; `|| true` so the
          # zero-match case reaches the diagnostic instead of set -e killing the assignment.
          base="$(sed -n 's/^fedora_bootc_base *= *"\(.*\)"/\1/p' versions.toml)"
          test -n "$base" || { echo "fedora_bootc_base missing from versions.toml" >&2; exit 1; }
          froms="$(grep -c "^FROM ${base}\( \|\$\)" image/Containerfile || true)"
          vgpu="$(grep -c "^FROM ${base}\( \|\$\)" image/vgpu/Containerfile.nvidia-vgpu-unlock || true)"
          [ "$froms" = "2" ] && [ "$vgpu" = "1" ] || {
            echo "FROM lines don't match versions.toml fedora_bootc_base=${base} (Containerfile ${froms}/2, vgpu-unlock ${vgpu}/1)" >&2
            exit 1
          }
          # rust-toolchain.toml and versions.toml must agree on the pinned toolchain.
          rt="$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)"
          vt="$(sed -n 's/^rust *= *"\(.*\)"/\1/p' versions.toml)"
          [ "$rt" = "$vt" ] || { echo "rust pin mismatch: rust-toolchain.toml=$rt versions.toml=$vt" >&2; exit 1; }
          echo "ok (base=$base rust=$rt)"
