# Auto-login the primary virtual terminal so a plugged-in monitor lands straight in the Tendril
# console (an appliance UX). /etc/profile.d/tendril-console.sh then launches the menu. Other VTs
# (tty2–tty6) and SSH still present a normal login prompt.
[Service]
ExecStart=
ExecStart=-/sbin/agetty -o '-p -- \\u' --autologin root --noclear %I $TERM
