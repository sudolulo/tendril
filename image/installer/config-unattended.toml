# bootc-image-builder installer config for a TOUCHLESS Tendril ISO (opt-in, not the default).
#
# Unlike image/installer/config.toml (guided — the human picks disk/login/language), this variant
# installs hands-off: for CI/test VMs and fleet provisioning. bootc-image-builder injects the
# ostreecontainer payload itself; this kickstart only adds language, safe partitioning, and a default
# login that must be changed on first use.
#
# SAFETY: partitioning is chosen by a %pre script that targets a SINGLE disk (the only disk, else the
# smallest) and wipes ONLY that one — never a blind `clearpart --all` across every attached disk. On a
# multi-disk host, attach only the intended disk, or override with your own `inst.ks`.
#
# Build with: scripts/build-installer.sh --unattended

[customizations.installer.kickstart]
contents = """
# --- Tendril unattended defaults ---
lang en_US.UTF-8
keyboard --xlayouts='us'
timezone UTC --utc
network --bootproto=dhcp --activate --hostname=tendril

# Pick a single install target safely and write the partitioning directives (never wipe every disk).
# Only REAL disks: skip zram (Fedora's installer env has a zram swap device that reports TYPE=disk),
# plus loop/ram/rom/dm/nbd — none are valid install targets.
%pre --interpreter=/bin/bash --erroronfail
disks=""
for d in $(lsblk -dnro NAME,TYPE | awk '$2=="disk"{print $1}'); do
  case "$d" in zram*|loop*|ram*|sr*|fd*|nbd*|dm-*) continue ;; esac
  disks="$disks $d"
done
set -- $disks
if [ "$#" -eq 0 ]; then
  echo "unattended install: no installable disk found" >&2
  exit 1
elif [ "$#" -eq 1 ]; then
  target="$1"
else
  # Multiple disks: choose the smallest (least likely to be a data drive). Deployers wanting a
  # specific disk should present only that disk, or supply their own inst.ks.
  best=""; bestsz=0
  for d in $disks; do
    sz="$(cat /sys/block/$d/size 2>/dev/null || echo 0)"
    if [ -z "$best" ] || [ "$sz" -lt "$bestsz" ]; then best="$d"; bestsz="$sz"; fi
  done
  target="$best"
fi
cat > /tmp/tendril-part.ks <<EOF
ignoredisk --only-use=$target
clearpart --drives=$target --all --initlabel
autopart
EOF
%end
%include /tmp/tendril-part.ks

# Console login. The image auto-logs-in root on tty1 (agetty --autologin root) to open the console
# menu, so root must NOT be locked — a locked account dead-ends the autologin at a password prompt.
# Give root a default password (unlocked) for local sudo; the REAL security gate is the web admin
# password, seeded + force-changed by the first-boot unit below. Physical console access is trusted
# (it's the owner's machine). No separate `tendril` user — it duplicated root and, when its password
# was force-expired, also broke SSH. Change the default with `passwd` after first boot.
rootpw --plaintext tendril

# Reboot into the installed system when the install finishes.
reboot --eject

%post --erroronfail

# Seed a default WEB admin password and flag it must-change, so the web console forces a new one on
# first visit (a fleet deployer can log in with the default to pre-seed config before a human does).
mkdir -p /etc/tendril
cat > /etc/systemd/system/tendril-seed-admin.service <<'UNIT'
[Unit]
Description=Seed the default Tendril web admin password (once)
ConditionPathExists=!/etc/tendril/webauth
Before=tendril-web.service
[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/bin/sh -c 'echo tendril | /usr/local/bin/tendril-web --seed-default-password'
[Install]
WantedBy=multi-user.target
UNIT
systemctl enable tendril-seed-admin.service || true

cat > /etc/motd <<'MOTD'

  Tendril — one machine, many tendrils.  (unattended install)

  Web UI:   http://<this-host>/   — a default admin password is set; you'll be
            required to change it on first sign-in.
  Console:  the `tendril` menu opens automatically on this display (tty1).
            Local sudo/SSH is root with the default password 'tendril' — run
            `passwd` to change it.

MOTD
%end
"""
